<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM 自动化测试平台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; font-weight: 600; }
.badge { background: #2563eb; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 99px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-left: auto; transition: background .3s; }
.status-dot.running { background: #f59e0b; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.status-text { font-size: 13px; color: #94a3b8; }

main { display: grid; grid-template-columns: 420px 1fr; gap: 20px; padding: 24px 32px; height: calc(100vh - 61px); }

.left-panel { display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.right-panel { display: flex; flex-direction: column; gap: 16px; min-height: 0; }

.card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 18px 20px; }
.card h2 { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }

/* ── Testcase cards ── */
.tc-card { cursor: default; transition: border-color .15s; }
.tc-card.active { border-color: #2563eb; }
.tc-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.tc-icon { font-size: 20px; flex-shrink: 0; }
.tc-info { flex: 1; }
.tc-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.tc-desc { font-size: 12px; color: #64748b; line-height: 1.5; margin-bottom: 10px; }
.tc-meta { font-size: 11px; color: #475569; margin-bottom: 12px; }
.tc-footer { display: flex; align-items: center; gap: 10px; }
.tc-last-run { font-size: 11px; color: #475569; flex: 1; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-secondary { background: #2d3148; color: #e2e8f0; }

/* ── 定时 ── */
.schedule-section h2 { margin-bottom: 10px; }
.schedule-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toggle { position: relative; width: 34px; height: 18px; cursor: pointer; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider { position: absolute; inset: 0; background: #374151; border-radius: 20px; transition: .2s; }
.toggle .slider:before { content: ''; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
.toggle input:checked + .slider { background: #2563eb; }
.toggle input:checked + .slider:before { transform: translateX(16px); }
.toggle-label { font-size: 12px; color: #94a3b8; }
.schedule-row select, .schedule-row input { background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; color: #e2e8f0; padding: 6px 8px; font-size: 12px; }
.schedule-row select:focus, .schedule-row input:focus { outline: none; border-color: #2563eb; }

/* ── 日志 ── */
.log-card { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.log-header h2 { margin-bottom: 0; }
.log-meta { font-size: 11px; color: #475569; }
.log-box { flex: 1; background: #0a0c14; border: 1px solid #1e2236; border-radius: 8px; overflow-y: auto; padding: 12px 14px; font-family: 'Cascadia Code','Fira Code',monospace; font-size: 11.5px; line-height: 1.65; min-height: 200px; }
.log-line { white-space: pre-wrap; word-break: break-all; }
.log-line.ok { color: #4ade80; }
.log-line.fail { color: #f87171; }
.log-line.warn { color: #fbbf24; }
.log-line.info { color: #60a5fa; }
.log-line.dim { color: #374151; }
.log-empty { color: #374151; font-style: italic; }

/* ── 历史 ── */
.history-card { flex: 0 0 auto; max-height: 220px; overflow: hidden; display: flex; flex-direction: column; }
.history-list { overflow-y: auto; flex: 1; }
.history-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; cursor: pointer; transition: background .1s; border-bottom: 1px solid #1e2236; }
.history-item:hover { background: #232639; }
.history-item:last-child { border-bottom: none; }
.run-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.run-dot.passed { background: #22c55e; }
.run-dot.failed { background: #ef4444; }
.run-dot.running { background: #f59e0b; animation: pulse 1s infinite; }
.run-tc { font-size: 11px; color: #64748b; flex-shrink: 0; width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.run-time { font-size: 11px; color: #94a3b8; flex: 1; }
.run-stats { font-size: 11px; }
.run-stats .p { color: #4ade80; }
.run-stats .f { color: #f87171; }
.run-duration { font-size: 11px; color: #475569; }
.empty-state { color: #374151; font-size: 12px; text-align: center; padding: 16px; }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; width: 90vw; max-width: 860px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 10px; }
.modal-header h3 { font-size: 14px; flex: 1; }
.modal-close { background: none; border: none; color: #64748b; cursor: pointer; font-size: 18px; line-height: 1; }
.modal-stats { padding: 14px 20px; display: flex; gap: 20px; border-bottom: 1px solid #2d3148; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 10px; color: #64748b; }
.stat-value { font-size: 15px; font-weight: 600; }
.stat-value.g { color: #4ade80; }
.stat-value.r { color: #f87171; }
.stat-value.y { color: #fbbf24; }
.modal-logs { flex: 1; overflow-y: auto; padding: 14px 20px; font-family: 'Cascadia Code','Fira Code',monospace; font-size: 11.5px; line-height: 1.65; background: #0a0c14; margin: 0 20px 20px; border-radius: 8px; border: 1px solid #1e2236; }

.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 10px 16px; font-size: 12px; display: none; z-index: 200; }
.toast.show { display: block; animation: slideIn .2s ease; }
@keyframes slideIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
.toast.ok { border-color: #16a34a; }
.toast.err { border-color: #dc2626; }
</style>
</head>
<body>
<header>
  <span style="font-size:20px">🧪</span>
  <h1>CRM 自动化测试平台</h1>
  <span class="badge">Beta</span>
  <span class="status-text" id="headerStatus">空闲</span>
  <div class="status-dot" id="headerDot"></div>
</header>
<main>
  <div class="left-panel">
    <div class="card" style="padding-bottom:14px">
      <h2>Test Cases</h2>
      <div id="tcList" style="display:flex;flex-direction:column;gap:12px"></div>
    </div>
    <div class="card schedule-section">
      <h2>定时运行</h2>
      <div class="schedule-row">
        <label class="toggle"><input type="checkbox" id="schedEnabled" onchange="scheduleChanged()"><span class="slider"></span></label>
        <span class="toggle-label" id="schedLabel">已禁用</span>
      </div>
      <div class="schedule-row" style="margin-top:10px">
        <select id="schedPreset" onchange="presetChanged()" style="flex:1">
          <option value="">-- 预设 --</option>
          <option value="0 8 * * *">每天 08:00</option>
          <option value="0 9 * * 1-5">工作日 09:00</option>
          <option value="0 * * * *">每小时</option>
          <option value="*/30 * * * *">每30分钟</option>
        </select>
        <input type="text" id="schedCron" value="0 8 * * *" style="flex:1;min-width:120px" placeholder="Cron 表达式">
        <button class="btn btn-secondary" onclick="saveSchedule()">保存</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="card log-card">
      <div class="log-header">
        <h2>运行日志</h2>
        <span class="log-meta" id="logMeta">—</span>
      </div>
      <div class="log-box" id="logBox"><span class="log-empty">选择一个 Test Case 并点击「运行」</span></div>
    </div>
    <div class="card history-card">
      <h2>运行历史</h2>
      <div class="history-list" id="historyList"><div class="empty-state">暂无记录</div></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">运行报告</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-stats" id="modalStats"></div>
    <div class="modal-logs" id="modalLogs"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── 状态 ─────────────────────────────────────────────────────────────────────
let testcases = [];
let runningTcId = null;
let sseSource = null;

// ── 初始化 ────────────────────────────────────────────────────────────────────
async function init() {
  await loadTestcases();
  await loadHistory();
  await loadSchedule();
  const status = await apiFetch('/api/status');
  if (status && status.running) {
    const runId = status.currentRunId;
    const hist = await apiFetch(`/api/history/${runId}`);
    if (hist) {
      setRunning(hist.testcaseId, runId);
      attachSSE(runId, hist.testcaseId);
    }
  }
}

async function loadTestcases() {
  const data = await apiFetch('/api/testcases');
  if (!data) return;
  testcases = data;
  const list = document.getElementById('tcList');
  list.innerHTML = data.map(tc => `
    <div class="card tc-card" id="tc-${tc.id}" style="padding:14px 16px;margin:0">
      <div class="tc-header">
        <div class="tc-icon">${tc.id === 'crm-full-flow' ? '🏢' : '🤖'}</div>
        <div class="tc-info">
          <div class="tc-name">${tc.name}</div>
          <div class="tc-desc">${tc.description}</div>
          <div class="tc-meta">步骤数：${tc.steps}</div>
        </div>
      </div>
      <div class="tc-footer">
        <span class="tc-last-run" id="tc-lastrun-${tc.id}">—</span>
        <button class="btn btn-primary" id="btn-run-${tc.id}" onclick="startRun('${tc.id}')">▶ 运行</button>
      </div>
    </div>
  `).join('');
  // 更新各 case 最近一次运行状态
  const hist = await apiFetch('/api/history');
  if (hist) updateTcLastRun(hist);
}

function updateTcLastRun(history) {
  testcases.forEach(tc => {
    const last = history.find(r => r.testcaseId === tc.id);
    const el = document.getElementById(`tc-lastrun-${tc.id}`);
    if (el && last) {
      const ts = new Date(last.startTime).toLocaleString('zh-CN');
      const icon = last.status === 'passed' ? '✅' : last.status === 'failed' ? '❌' : '⏳';
      el.textContent = `${icon} ${ts}`;
    }
  });
}

// ── 运行 ──────────────────────────────────────────────────────────────────────
async function startRun(testcaseId) {
  const res = await fetch('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ testcaseId })
  });
  const data = await res.json();
  if (!res.ok) return showToast(data.error, 'err');

  setRunning(testcaseId, data.runId);
  clearLog();
  const tc = testcases.find(t => t.id === testcaseId);
  appendLog(`⏳ 开始运行：${tc?.name || testcaseId}`, 'info');
  appendLog(`   RunId: ${data.runId}`, 'dim');
  attachSSE(data.runId, testcaseId);
  updateLogMeta(testcaseId, data.runId);
  loadHistory();
}

function attachSSE(runId, testcaseId) {
  if (sseSource) { sseSource.close(); sseSource = null; }
  sseSource = new EventSource(`/api/stream/${runId}`);

  sseSource.addEventListener('log', e => {
    const { line } = JSON.parse(e.data);
    appendLog(line);
  });

  sseSource.addEventListener('done', e => {
    const stats = JSON.parse(e.data);
    appendLog('', 'dim');
    appendLog('─────────────────────────────────────────', 'dim');
    const icon = stats.failed > 0 ? '❌' : '✅';
    appendLog(`${icon}  通过: ${stats.passed}  失败: ${stats.failed}  跳过: ${stats.skipped || 0}  耗时: ${stats.duration}`, stats.failed > 0 ? 'fail' : 'ok');
    appendLog('─────────────────────────────────────────', 'dim');
    setRunning(null);
    loadHistory();
    sseSource.close(); sseSource = null;
  });

  sseSource.onerror = () => { sseSource && sseSource.close(); sseSource = null; setRunning(null); };
}

// ── 日志 ─────────────────────────────────────────────────────────────────────
function clearLog() { document.getElementById('logBox').innerHTML = ''; }

function appendLog(line, forceClass) {
  const box = document.getElementById('logBox');
  const div = document.createElement('div');
  div.className = 'log-line ' + (forceClass || classifyLine(line));
  div.textContent = line;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function classifyLine(line) {
  if (!line.trim()) return 'dim';
  if (line.includes('✅') || /\bok\b/.test(line)) return 'ok';
  if (line.includes('❌') || /failed/.test(line)) return 'fail';
  if (line.includes('⚠️') || line.includes('[stderr]')) return 'warn';
  if (line.includes('🎉') || line.includes('🔄') || line.includes('📋') || line.includes('📦') || line.startsWith('⏳')) return 'info';
  if (line.startsWith('─') || line.startsWith(' ')) return 'dim';
  return '';
}

function updateLogMeta(testcaseId, runId) {
  const tc = testcases.find(t => t.id === testcaseId);
  const ts = new Date(parseInt(runId.replace('run_', ''))).toLocaleString('zh-CN');
  document.getElementById('logMeta').textContent = `${tc?.name || testcaseId} · ${ts}`;
}

// ── 状态控制 ──────────────────────────────────────────────────────────────────
function setRunning(testcaseId, runId) {
  runningTcId = testcaseId;
  const running = !!testcaseId;

  document.getElementById('headerDot').className = 'status-dot' + (running ? ' running' : '');
  document.getElementById('headerStatus').textContent = running ? '运行中' : '空闲';

  testcases.forEach(tc => {
    const btn = document.getElementById(`btn-run-${tc.id}`);
    if (btn) {
      btn.disabled = running;
      btn.textContent = (running && tc.id === testcaseId) ? '⏳ 运行中...' : '▶ 运行';
    }
  });
}

// ── 历史 ─────────────────────────────────────────────────────────────────────
async function loadHistory() {
  const history = await apiFetch('/api/history');
  if (!history) return;

  const list = document.getElementById('historyList');
  if (!history.length) { list.innerHTML = '<div class="empty-state">暂无记录</div>'; return; }

  list.innerHTML = history.slice(0, 30).map(run => {
    const ts = new Date(run.startTime).toLocaleString('zh-CN');
    const tc = testcases.find(t => t.id === run.testcaseId);
    const tcName = tc?.name || run.testcaseId || 'All';
    const statsHtml = run.status === 'running'
      ? '<span style="color:#f59e0b">运行中...</span>'
      : `<span class="p">✅${run.passed}</span> <span class="f">❌${run.failed}</span>`;
    return `<div class="history-item" onclick="showReport('${run.id}')">
      <div class="run-dot ${run.status}"></div>
      <div class="run-tc" title="${tcName}">${tcName}</div>
      <div class="run-time">${ts}</div>
      <div class="run-stats">${statsHtml}</div>
      <div class="run-duration">${run.duration || '—'}</div>
    </div>`;
  }).join('');

  updateTcLastRun(history);
}

// ── Report 弹窗 ───────────────────────────────────────────────────────────────
async function showReport(runId) {
  const run = await apiFetch(`/api/history/${runId}`);
  if (!run) return;
  const ts = new Date(run.startTime).toLocaleString('zh-CN');
  const tc = testcases.find(t => t.id === run.testcaseId);
  document.getElementById('modalTitle').textContent = `${tc?.name || run.testcaseId} · ${ts}`;
  const sc = run.status === 'passed' ? 'g' : run.status === 'failed' ? 'r' : 'y';
  const st = run.status === 'passed' ? '✅ 通过' : run.status === 'failed' ? '❌ 失败' : '⏳ 运行中';
  document.getElementById('modalStats').innerHTML = `
    <div class="stat"><div class="stat-label">状态</div><div class="stat-value ${sc}">${st}</div></div>
    <div class="stat"><div class="stat-label">通过</div><div class="stat-value g">${run.passed}</div></div>
    <div class="stat"><div class="stat-label">失败</div><div class="stat-value r">${run.failed}</div></div>
    <div class="stat"><div class="stat-label">跳过</div><div class="stat-value">${run.skipped}</div></div>
    <div class="stat"><div class="stat-label">耗时</div><div class="stat-value">${run.duration || '—'}</div></div>
    <div class="stat"><div class="stat-label">时间</div><div class="stat-value" style="font-size:12px">${ts}</div></div>`;
  document.getElementById('modalLogs').innerHTML = (run.logs || []).map(l =>
    `<div class="log-line ${classifyLine(l)}">${escapeHtml(l)}</div>`
  ).join('') || '<span class="log-empty">无日志</span>';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => { document.getElementById('modalLogs').scrollTop = 999999; }, 50);
}
function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 定时 ─────────────────────────────────────────────────────────────────────
async function loadSchedule() {
  const data = await apiFetch('/api/schedule');
  if (!data) return;
  document.getElementById('schedEnabled').checked = data.enabled;
  document.getElementById('schedCron').value = data.cron;
  document.getElementById('schedLabel').textContent = data.enabled ? '已启用' : '已禁用';
}
function scheduleChanged() {
  document.getElementById('schedLabel').textContent = document.getElementById('schedEnabled').checked ? '已启用' : '已禁用';
}
function presetChanged() {
  const v = document.getElementById('schedPreset').value;
  if (v) document.getElementById('schedCron').value = v;
}
async function saveSchedule() {
  const enabled = document.getElementById('schedEnabled').checked;
  const cron = document.getElementById('schedCron').value.trim();
  const res = await fetch('/api/schedule', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ enabled, cron }) });
  const data = await res.json();
  if (!res.ok) return showToast(data.error, 'err');
  showToast(enabled ? `✅ 定时任务已启用：${cron}` : '定时任务已禁用', 'ok');
}

// ── 工具 ─────────────────────────────────────────────────────────────────────
async function apiFetch(url) {
  try { const r = await fetch(url); if (!r.ok) return null; return r.json(); } catch { return null; }
}
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

setInterval(loadHistory, 5000);
init();
</script>
</body>
</html>
